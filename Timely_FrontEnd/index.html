<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timely Real Estate</title>
    <style>
      /* Loading screen — shows before React mounts */
      #app-loader {
        position: fixed;
        inset: 0;
        background: #0f172a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.4s ease-out;
      }
      #app-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #app-loader .logo-icon {
        width: 64px;
        height: 64px;
        margin-bottom: 24px;
        animation: float 2s ease-in-out infinite;
      }
      #app-loader .logo-text {
        font-family: 'Georgia', 'Times New Roman', serif;
        font-size: 28px;
        font-weight: bold;
        color: #ffffff;
        letter-spacing: 4px;
        margin-bottom: 4px;
      }
      #app-loader .logo-sub {
        font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
        font-size: 11px;
        color: #64748b;
        letter-spacing: 6px;
        text-transform: uppercase;
        margin-bottom: 40px;
      }
      #app-loader .loader-bar {
        width: 160px;
        height: 3px;
        background: #1e293b;
        border-radius: 3px;
        overflow: hidden;
      }
      #app-loader .loader-fill {
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, #3b82f6, #60a5fa);
        border-radius: 3px;
        animation: loading 1.2s ease-in-out infinite;
      }
      @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(400%); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
    </style>
  </head>
  <body>
    <!-- Loading screen -->
    <div id="app-loader">
      <svg class="logo-icon" viewBox="0 0 120 112" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="60,12 10,52 20,52 20,100 100,100 100,52 110,52" fill="none" stroke="#3b82f6" stroke-width="5" stroke-linejoin="round"/>
        <rect x="47" y="65" width="26" height="35" rx="2" fill="#3b82f6"/>
        <circle cx="60" cy="48" r="14" fill="none" stroke="#c9a84c" stroke-width="2.5"/>
        <line x1="60" y1="48" x2="60" y2="38" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="60" y1="48" x2="68" y2="48" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="60" cy="48" r="2" fill="#c9a84c"/>
      </svg>
      <div class="logo-text">TIMELY</div>
      <div class="logo-sub">Real Estate</div>
      <div class="loader-bar">
        <div class="loader-fill"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove loader once React mounts
      window.addEventListener('DOMContentLoaded', () => {
        const checkReact = setInterval(() => {
          const root = document.getElementById('root');
          if (root && root.children.length > 0) {
            const loader = document.getElementById('app-loader');
            if (loader) {
              loader.classList.add('fade-out');
              setTimeout(() => loader.remove(), 400);
            }
            clearInterval(checkReact);
          }
        }, 100);
      });
    </script>
  </body>
</html>
