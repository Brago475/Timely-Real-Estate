<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/assets/Timely_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timely Real Estate</title>
    <style>
      html, body {
        background: #0a0a0a;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }

      #app-loader {
        position: fixed;
        inset: 0;
        background: #0a0a0a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.5s ease-out, transform 0.5s ease-out;
      }
      #app-loader.fade-out {
        opacity: 0;
        transform: scale(1.02);
        pointer-events: none;
      }

      /* Clock animation */
      .clock-container {
        position: relative;
        width: 80px;
        height: 80px;
        margin-bottom: 32px;
      }
      .clock-bg {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.08);
        display: flex;
        align-items: center;
        justify-content: center;
        animation: breathe 3s ease-in-out infinite;
      }
      .clock-ring {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        border: 2px solid rgba(59,130,246,0.3);
        position: relative;
        animation: ringPulse 3s ease-in-out infinite;
      }
      .clock-dot {
        position: absolute;
        width: 4px;
        height: 4px;
        background: #3b82f6;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      .clock-hand-m {
        position: absolute;
        width: 2px;
        height: 16px;
        background: #3b82f6;
        border-radius: 2px;
        top: 50%;
        left: 50%;
        transform-origin: bottom center;
        transform: translate(-50%, -100%);
        animation: minuteHand 2s linear infinite;
      }
      .clock-hand-h {
        position: absolute;
        width: 2.5px;
        height: 11px;
        background: #60a5fa;
        border-radius: 2px;
        top: 50%;
        left: 50%;
        transform-origin: bottom center;
        transform: translate(-50%, -100%);
        animation: hourHand 6s linear infinite;
      }
      /* Tick marks */
      .clock-tick {
        position: absolute;
        width: 1.5px;
        height: 4px;
        background: rgba(255,255,255,0.15);
        top: 2px;
        left: 50%;
        transform-origin: 50% 24px;
      }

      /* Orbiting dot */
      .orbit-dot {
        position: absolute;
        width: 6px;
        height: 6px;
        background: #3b82f6;
        border-radius: 50%;
        top: -3px;
        left: 50%;
        transform-origin: 50% 43px;
        animation: orbit 2.5s linear infinite;
        box-shadow: 0 0 12px rgba(59,130,246,0.6);
      }

      .logo-text {
        font-family: 'Georgia', 'Times New Roman', serif;
        font-size: 26px;
        font-weight: bold;
        color: #ffffff;
        letter-spacing: 6px;
        margin-bottom: 4px;
        opacity: 0;
        animation: textIn 0.6s ease-out 0.3s forwards;
      }
      .logo-sub {
        font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
        font-size: 10px;
        color: #444;
        letter-spacing: 8px;
        text-transform: uppercase;
        margin-bottom: 48px;
        opacity: 0;
        animation: textIn 0.6s ease-out 0.5s forwards;
      }

      /* Progress bar */
      .loader-track {
        width: 140px;
        height: 2px;
        background: #161616;
        border-radius: 2px;
        overflow: hidden;
        opacity: 0;
        animation: textIn 0.6s ease-out 0.7s forwards;
      }
      .loader-fill {
        height: 100%;
        width: 30%;
        background: linear-gradient(90deg, transparent, #3b82f6, transparent);
        border-radius: 2px;
        animation: slide 1.4s ease-in-out infinite;
      }

      /* Loading text */
      .loader-text {
        font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
        font-size: 11px;
        color: #333;
        margin-top: 16px;
        letter-spacing: 2px;
        opacity: 0;
        animation: textIn 0.6s ease-out 0.9s forwards;
      }
      .loader-text span {
        animation: dotPulse 1.4s ease-in-out infinite;
      }
      .loader-text span:nth-child(2) { animation-delay: 0.2s; }
      .loader-text span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes minuteHand {
        from { transform: translate(-50%, -100%) rotate(0deg); }
        to { transform: translate(-50%, -100%) rotate(360deg); }
      }
      @keyframes hourHand {
        from { transform: translate(-50%, -100%) rotate(0deg); }
        to { transform: translate(-50%, -100%) rotate(360deg); }
      }
      @keyframes orbit {
        from { transform: translateX(-50%) rotate(0deg); }
        to { transform: translateX(-50%) rotate(360deg); }
      }
      @keyframes ringPulse {
        0%, 100% { border-color: rgba(59,130,246,0.3); }
        50% { border-color: rgba(59,130,246,0.6); }
      }
      @keyframes breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.03); }
      }
      @keyframes slide {
        0% { transform: translateX(-150%); }
        100% { transform: translateX(500%); }
      }
      @keyframes textIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes dotPulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <!-- Animated Clock -->
      <div class="clock-container">
        <div class="clock-bg">
          <div class="clock-ring">
            <!-- Tick marks at 12, 3, 6, 9 -->
            <div class="clock-tick" style="transform: translateX(-50%) rotate(0deg)"></div>
            <div class="clock-tick" style="transform: translateX(-50%) rotate(90deg)"></div>
            <div class="clock-tick" style="transform: translateX(-50%) rotate(180deg)"></div>
            <div class="clock-tick" style="transform: translateX(-50%) rotate(270deg)"></div>
            <div class="clock-hand-h"></div>
            <div class="clock-hand-m"></div>
            <div class="clock-dot"></div>
          </div>
        </div>
        <div class="orbit-dot"></div>
      </div>

      <div class="logo-text">TIMELY</div>
      <div class="logo-sub">Real Estate</div>

      <div class="loader-track">
        <div class="loader-fill"></div>
      </div>

      <div class="loader-text">
        Loading<span>.</span><span>.</span><span>.</span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        const checkReact = setInterval(() => {
          const root = document.getElementById('root');
          if (root && root.children.length > 0) {
            const loader = document.getElementById('app-loader');
            if (loader) {
              loader.classList.add('fade-out');
              setTimeout(() => loader.remove(), 500);
            }
            clearInterval(checkReact);
          }
        }, 100);
      });
    </script>
  </body>
</html>
